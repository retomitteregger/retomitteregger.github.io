<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    (function () {
      var links = Array.from(document.querySelectorAll('.tab-link[href^="#"]'));
      var panels = Array.from(document.querySelectorAll('.tab-panel'));
      if (!links.length) return;

      function activate(hash) {
        if (!hash || !document.querySelector('.tab-panel' + hash)) hash = '#about';
        links.forEach(function (l) {
          var active = l.getAttribute('href') === hash;
          l.classList.toggle('active', active);
          l.setAttribute('aria-selected', active);
        });
        panels.forEach(function (p) {
          p.classList.toggle('active', '#' + p.id === hash);
        });
      }

      links.forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          var hash = this.getAttribute('href');
          activate(hash);
          history.pushState(null, '', hash);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      activate(window.location.hash || '#about');

      window.addEventListener('popstate', function () {
        activate(window.location.hash || '#about');
      });
    })();
  </script>
</body>
</html>
