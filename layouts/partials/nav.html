<header class="site-header">
  <div class="nav-inner">
    <a class="site-brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    <div class="nav-right">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        Menu
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="nav-chevron"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <nav id="site-nav" aria-label="Main navigation">
        <ul class="nav-menu">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </div>
</header>
