{{ define "main" }}
<article class="page-content">
  <h1>{{ .Title }}</h1>
  {{ with .Date }}<p class="post-meta">{{ .Format "January 2, 2006" }}{{ with $.Params.tags }} · {{ delimit . ", " }}{{ end }}</p>{{ end }}
  {{ .Content }}
  <p style="margin-top: 2rem;"><a href="{{ "/blog/" | relURL }}">← All posts</a></p>
</article>
{{ end }}
